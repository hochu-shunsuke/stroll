name: CI

# PR で、型・ビルド・単体テストを回す。
# main への push では deploy.yml の verify ジョブが同じ検証をするので、
# ここでは走らせない（二重に回さない）。
#
# 中継サーバ相手のプロトコルテストはネットワークに依存するのでここには入れない
# （ローカルで npm run relay を立てて別途確認する）。
on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run ci
