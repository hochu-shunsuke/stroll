name: Deploy

# main に入ったものを Cloudflare へ出す。
#
# 検証（型・ビルド・テスト）を通ったときだけデプロイする。
# Cloudflare 側の GitHub 連携で自動デプロイすると、CI が落ちていても
# 出てしまう（ゲートが無い）。だからデプロイもここで管理する。
# 二重に出さないよう、Cloudflare 側の連携は切っておくこと。
on:
  push:
    branches: [main]
  # 手で出したいとき用（本番だけ直したい、再デプロイしたい等）。
  workflow_dispatch:

# 同時に走らせない。後から来た方を待たせて、順番に出す。
# 並行すると、古いビルドが新しいビルドを上書きしうる。
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ここが門。落ちれば deploy は動かない。
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run ci

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # クライアントを組んでから Worker を出す。
      # dist/ を Worker が配るので、ビルドが先でないと古い画面が出る。
      - run: npm run build
      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config server/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
